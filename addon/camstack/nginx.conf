server {
    listen 8099;
    server_name localhost;
    root /usr/share/nginx/html;

    # Ingress path: /api/hassio_ingress/camstack/
    location /api/hassio_ingress/camstack/ {
        try_files $uri $uri/ /api/hassio_ingress/camstack/index.html;
    }

    # Cache static assets
    location ~* \.(js|css|ico|png|svg|woff2?|ttf|eot|map|webmanifest|json)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
